name: discord-bot-build-deploy

on:
  push:
    tags:
      - 'discord-bot-[0-9]+.**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nmagee/discord-bot
  SVC_NAME: discordBot
  DOCKER_BUILDKIT: 1

jobs:

  build-push-ghcr:

    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        run: echo "IMAGE_TAG=${GITHUB_REF_NAME#discord-bot-}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          provenance: false
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest

      - name: Remote Dispatch SDS
        run: |
          curl -X POST https://api.github.com/repos/uvads/uvasds-services/dispatches \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: token ${{ secrets.GHCR_PAT }}" \
            --data '{"event_type": "${{ env.IMAGE_NAME }} update to ${{ env.IMAGE_TAG }}", "client_payload": { "service": "${{ env.SVC_NAME }}", "version": "${{ env.IMAGE_TAG }}" }}'

